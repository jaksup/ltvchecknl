<!-- No external requests. No analytics. No cookies. System fonts only. -->
<style>
/* ── Reset ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f5f4f0;
  --surface:   #ffffff;
  --border:    #e2dfd6;
  --text:      #18170f;
  --muted:     #7a7668;
  --accent:    #2a6041;
  --accent-lt: #edf5f0;
  --accent-dk: #1e4a30;
  --warn:      #854d0e;
  --warn-bg:   #fefce8;
  --warn-bd:   #fcd34d;
  --red:       #b91c1c;
  --red-bg:    #fef2f2;
  --radius:    14px;
  --shadow:    0 1px 12px rgba(0,0,0,0.06), 0 4px 20px rgba(0,0,0,0.04);
  --font:      -apple-system, 'Segoe UI', system-ui, Helvetica, Arial, sans-serif;
  --font-serif: Georgia, 'Times New Roman', serif;
}

html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 1rem 5rem;
  line-height: 1.5;
}

/* ── Layout ──────────────────────────────────────────────────── */
.wrap { max-width: 580px; margin: 0 auto; }

/* ── Logo ────────────────────────────────────────────────────── */
.logo {
  font-family: var(--font-serif);
  font-size: 1.3rem;
  letter-spacing: -0.03em;
  color: var(--text);
  user-select: none;
}
.logo span {
  color: var(--accent);
  font-style: italic;
}

/* ── Lang toggle ─────────────────────────────────────────────── */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.25rem 0 0;
  margin-bottom: 0.25rem;
}
.lang-toggle { display: flex; gap: 3px; }
.lang-btn {
  font-family: var(--font);
  font-size: 0.73rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 4px 11px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.lang-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

/* ── Header ──────────────────────────────────────────────────── */
header { padding: 1.75rem 0 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
.eyebrow {
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 0.6rem;
}
h1 {
  font-family: var(--font-serif);
  font-size: clamp(1.8rem, 5vw, 2.5rem);
  line-height: 1.15; letter-spacing: -0.01em;
  color: var(--text); margin-bottom: 0.9rem; font-weight: normal;
}
.intro-text { font-size: 0.97rem; color: var(--muted); line-height: 1.7; max-width: 500px; }

/* Privacy badge */
.privacy-badge {
  display: inline-flex; align-items: center; gap: 0.4rem;
  margin-top: 1.1rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.5rem 0.85rem;
  font-size: 0.78rem; color: var(--muted); line-height: 1.4;
}
.privacy-badge .lock { font-size: 0.9rem; }

/* ── Card ────────────────────────────────────────────────────── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.6rem;
  box-shadow: var(--shadow); margin-bottom: 1rem;
}
.card-title {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 1.1rem;
}

/* ── Step 0: NHG ─────────────────────────────────────────────── */
.nhg-question { font-size: 0.96rem; font-weight: 600; color: var(--text); margin-bottom: 0.9rem; line-height: 1.4; }
.nhg-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.1rem; line-height: 1.55; }
.nhg-btns { display: flex; gap: 0.6rem; }
.nhg-btn {
  flex: 1; font-family: var(--font); font-size: 0.9rem; font-weight: 600;
  padding: 0.65rem 1rem; border-radius: 9px; border: 1.5px solid var(--border);
  background: var(--bg); color: var(--text); cursor: pointer; transition: all 0.15s;
}
.nhg-btn:hover { border-color: var(--accent); color: var(--accent); }
.nhg-btn.selected-yes { background: var(--warn-bg); border-color: var(--warn-bd); color: var(--warn); }
.nhg-btn.selected-no  { background: var(--accent-lt); border-color: var(--accent); color: var(--accent-dk); }

.nhg-result {
  display: none; margin-top: 1rem; padding: 1rem 1.1rem;
  border-radius: 10px; font-size: 0.88rem; line-height: 1.6;
}
.nhg-result.nhg-yes { background: var(--warn-bg); border: 1px solid var(--warn-bd); color: var(--warn); }
.nhg-result.nhg-no  { background: var(--accent-lt); border: 1px solid #b6d9c4; color: var(--accent-dk); }

/* ── WOZ box ─────────────────────────────────────────────────── */
.woz-box {
  background: var(--accent-lt); border: 1px solid #c5dece;
  border-radius: var(--radius); padding: 1.1rem 1.25rem;
  margin-bottom: 1rem; font-size: 0.87rem; color: var(--accent-dk); line-height: 1.65;
}
.woz-box strong { display: block; margin-bottom: 0.25rem; font-size: 0.9rem; }
.woz-box a { color: var(--accent); font-weight: 700; }

/* ── Form fields ─────────────────────────────────────────────── */
.field { margin-bottom: 1.1rem; }
.field:last-of-type { margin-bottom: 0; }
label {
  display: block; font-size: 0.81rem; font-weight: 600;
  color: var(--text); margin-bottom: 0.35rem;
}
label .hint { font-weight: 400; color: var(--muted); margin-left: 0.35rem; font-size: 0.76rem; }
.input-wrap { position: relative; }
.prefix, .suffix {
  position: absolute; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 0.9rem; pointer-events: none;
}
.prefix { left: 11px; }
.suffix { right: 11px; font-size: 0.78rem; }

input[type="number"] {
  width: 100%; font-family: var(--font); font-size: 0.97rem; font-weight: 500;
  padding: 0.65rem 2.5rem 0.65rem 1.85rem;
  border: 1.5px solid var(--border); border-radius: 9px;
  background: var(--bg); color: var(--text); outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  -moz-appearance: textfield;
}
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type="number"]:focus {
  border-color: var(--accent); background: #fff;
  box-shadow: 0 0 0 3px rgba(42,96,65,0.1);
}

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
@media (max-width: 440px) { .two-col { grid-template-columns: 1fr; } }

/* ── Mortgage parts ──────────────────────────────────────────── */
.part-row {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 0.75rem;
  padding: 0.75rem 0; border-bottom: 1px solid var(--border);
}
.part-row:last-of-type { border-bottom: none; padding-bottom: 0; }
.part-label { font-size: 0.78rem; font-weight: 600; color: var(--muted); white-space: nowrap; }
.remove-btn {
  background: none; border: none; cursor: pointer; color: var(--muted);
  font-size: 1.1rem; line-height: 1; padding: 2px 4px; border-radius: 4px;
  transition: color 0.15s;
}
.remove-btn:hover { color: var(--red); }

.add-part-btn {
  display: flex; align-items: center; gap: 0.4rem;
  margin-top: 0.85rem; font-family: var(--font); font-size: 0.83rem; font-weight: 600;
  color: var(--accent); background: none; border: 1.5px dashed #b6d9c4;
  border-radius: 8px; padding: 0.5rem 0.9rem; cursor: pointer;
  transition: all 0.15s; width: 100%;
}
.add-part-btn:hover { background: var(--accent-lt); border-color: var(--accent); }

.debt-total {
  margin-top: 0.75rem; padding: 0.65rem 0.9rem;
  background: var(--bg); border-radius: 8px;
  font-size: 0.84rem; color: var(--muted);
  display: flex; justify-content: space-between; align-items: center;
}
.debt-total strong { color: var(--text); font-size: 0.95rem; }

/* ── Button ──────────────────────────────────────────────────── */
.btn-primary {
  width: 100%; font-family: var(--font); font-size: 0.97rem; font-weight: 700;
  padding: 0.875rem 1.5rem; background: var(--accent); color: #fff;
  border: none; border-radius: 10px; cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  letter-spacing: -0.01em; margin-top: 0.25rem;
}
.btn-primary:hover { background: var(--accent-dk); }
.btn-primary:active { transform: scale(0.99); }

/* ── Results ─────────────────────────────────────────────────── */
#results { display: none; }
#results.visible { display: block; animation: fadeUp 0.3s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-banner {
  border-radius: var(--radius); padding: 1.1rem 1.25rem;
  font-size: 0.92rem; line-height: 1.6; margin-bottom: 1rem; font-weight: 500;
}
.banner-good { background: #f0faf4; border: 1px solid #86efac; color: #14532d; }
.banner-same { background: var(--warn-bg); border: 1px solid var(--warn-bd); color: var(--warn); }
.banner-none { background: var(--red-bg); border: 1px solid #fca5a5; color: var(--red); }

.ltv-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; margin-bottom: 0.85rem; }
.ltv-block {
  text-align: center; padding: 1.2rem 0.75rem;
  background: var(--bg); border-radius: 10px;
}
.ltv-block .lbl {
  font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted); margin-bottom: 0.35rem; font-weight: 700;
}
.ltv-block .num {
  font-family: var(--font-serif); font-size: 2.3rem;
  line-height: 1; letter-spacing: -0.01em;
}
.ltv-block .sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.35rem; }
.num.good    { color: #16a34a; }
.num.neutral { color: #d97706; }
.num.bad     { color: var(--red); }

.section-label {
  font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.09em; color: var(--muted); margin: 1.4rem 0 0.55rem;
}

table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
th {
  text-align: left; font-size: 0.67rem; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--muted); font-weight: 700;
  padding: 0 0.7rem 0.45rem; border-bottom: 1px solid var(--border);
}
td { padding: 0.52rem 0.7rem; border-bottom: 1px solid #f0ece4; color: var(--muted); }
tr.you td { background: var(--accent-lt); color: var(--accent-dk); font-weight: 600; }
tr.you td:first-child { border-left: 3px solid var(--accent); }
td.marker { color: var(--accent); font-size: 0.75rem; font-weight: 700; }

.btn-print {
  display: none;
  width: 100%; font-family: var(--font); font-size: 0.9rem; font-weight: 600;
  padding: 0.75rem 1.5rem; margin-top: 0.75rem;
  background: transparent; color: var(--muted);
  border: 1.5px solid var(--border); border-radius: 10px;
  cursor: pointer; transition: all 0.15s; letter-spacing: -0.01em;
}
.btn-print:hover { border-color: var(--accent); color: var(--accent); }
.btn-print.visible { display: block; }

@media print {
  .topbar, .lang-toggle, header .privacy-badge,
  #nhg-card, #main-form, .btn-print, footer { display: none !important; }
  body { background: white; padding: 0; }
  .wrap { max-width: 100%; }
  .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
  #results { display: block !important; }
  .result-banner { border: 1px solid #ccc !important; }
}

.table-caveat {
  font-size: 0.73rem; color: var(--muted); margin-top: 0.65rem;
  line-height: 1.55; font-style: italic;
}

/* Savings */
.savings-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 0.65rem; margin-top: 0.5rem;
}
@media(max-width:380px){ .savings-grid{ grid-template-columns:1fr 1fr; } }
.savings-cell {
  background: var(--accent-lt); border: 1px solid #c5dece;
  border-radius: 10px; padding: 0.9rem 0.6rem; text-align: center;
}
.savings-cell .val {
  font-family: var(--font-serif); font-size: 1.45rem; color: var(--accent); line-height: 1;
}
.savings-cell .lbl {
  font-size: 0.67rem; color: #4a7c5c; margin-top: 4px;
  text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;
}
.savings-note { font-size: 0.72rem; color: var(--muted); margin-top: 0.55rem; line-height: 1.5; }

/* Steps */
.step {
  display: flex; gap: 0.9rem; padding: 0.9rem 0;
  border-bottom: 1px solid var(--border); align-items: flex-start;
}
.step:last-child { border-bottom: none; padding-bottom: 0; }
.step-num {
  flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
  background: var(--accent-lt); color: var(--accent);
  font-size: 0.75rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center; margin-top: 1px;
}
.step-title { font-size: 0.9rem; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.step-body  { font-size: 0.83rem; color: var(--muted); line-height: 1.6; }
.step-body a { color: var(--accent); font-weight: 600; }

.tip-card {
  background: var(--warn-bg); border: 1px solid var(--warn-bd);
  border-radius: var(--radius); padding: 1.1rem 1.25rem;
  font-size: 0.87rem; color: var(--warn); line-height: 1.65;
}
.tip-card a { color: var(--warn); font-weight: 700; }

/* ── Footer ──────────────────────────────────────────────────── */
footer {
  margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);
  font-size: 0.76rem; color: var(--muted); line-height: 1.65;
}
footer a { color: var(--accent); }
.footer-row { margin-top: 0.5rem; }
.footer-contact { font-size: 0.76rem; color: var(--muted); }
.footer-contact .email-link { color: var(--accent); cursor: pointer; }
.footer-privacy {
  display: flex; align-items: flex-start; gap: 0.5rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 0.85rem;
  font-size: 0.78rem; color: var(--muted); line-height: 1.55;
}
</style>
<!-- Privacy-friendly analytics: no cookies, no personal data (goatcounter.com) -->
<script data-goatcounter="https://ltvchecknl.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="192x192" href="logo_192.png">
<link rel="apple-touch-icon" href="logo_192.png">
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="logo">ltv<span>check</span></div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('nl')" id="btn-nl">NL</button>
      <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
    </div>
  </div>

  <!-- Header -->
  <header>
    <div class="eyebrow" data-t="eyebrow"></div>
    <h1 data-t="title"></h1>
    <p class="intro-text" data-t="intro"></p>
    <div class="privacy-badge">
      <span class="lock">🔒</span>
      <span data-t="privacy_badge"></span>
    </div>
  </header>

  <!-- Step 0: NHG check -->
  <div class="card" id="nhg-card">
    <div class="card-title" data-t="step0_label"></div>
    <div class="nhg-question" data-t="nhg_question"></div>
    <div class="nhg-sub" data-t="nhg_sub"></div>
    <div class="nhg-btns">
      <button class="nhg-btn" id="nhg-yes" onclick="setNHG(true)" data-t="nhg_yes"></button>
      <button class="nhg-btn" id="nhg-no"  onclick="setNHG(false)" data-t="nhg_no"></button>
    </div>
    <div class="nhg-result nhg-yes" id="nhg-result-yes" data-t="nhg_result_yes"></div>
    <div class="nhg-result nhg-no"  id="nhg-result-no"  data-t="nhg_result_no"></div>
  </div>

  <!-- Main form (hidden until NHG answered No) -->
  <div id="main-form" style="display:none">

    <!-- WOZ explainer -->
    <div class="woz-box">
      <strong data-t="woz_title"></strong>
      <span data-t="woz_body"></span>
    </div>

    <!-- Property values -->
    <div class="card">
      <div class="card-title" data-t="form_title"></div>

      <div class="two-col">
        <div class="field">
          <label for="woz"><span data-t="woz_label"></span><span class="hint" data-t="woz_hint"></span></label>
          <div class="input-wrap">
            <span class="prefix">€</span>
            <input type="number" id="woz" value="350000" min="50000" max="5000000" step="1000">
          </div>
        </div>
        <div class="field">
          <label for="bank"><span data-t="bank_label"></span><span class="hint" data-t="bank_hint"></span></label>
          <div class="input-wrap">
            <span class="prefix">€</span>
            <input type="number" id="bank" value="300000" min="50000" max="5000000" step="1000">
          </div>
        </div>
      </div>
    </div>

    <!-- Mortgage parts -->
    <div class="card">
      <div class="card-title" data-t="debt_title"></div>
      <div id="parts-list"></div>
      <button class="add-part-btn" id="add-btn" onclick="addPart()">
        <span>＋</span> <span data-t="add_part"></span>
      </button>
      <div class="debt-total">
        <span data-t="total_label"></span>
        <strong id="debt-total-val">€ 0</strong>
      </div>
    </div>

    <button class="btn-primary" onclick="calculate()" data-t="btn"></button>
  </div>

  <!-- Results -->
  <div id="results">
    <div id="banner" class="result-banner"></div>

    <div class="card">
      <div class="ltv-row">
        <div class="ltv-block">
          <div class="lbl" data-t="then"></div>
          <div class="num" id="ltv-old"></div>
          <div class="sub" id="tier-old"></div>
        </div>
        <div class="ltv-block">
          <div class="lbl" data-t="now"></div>
          <div class="num" id="ltv-new"></div>
          <div class="sub" id="tier-new"></div>
        </div>
      </div>
      <div class="section-label" data-t="table_title"></div>
      <table>
        <thead><tr>
          <th data-t="col_ltv"></th>
          <th data-t="col_meaning"></th>
          <th></th>
        </tr></thead>
        <tbody id="tier-tbody"></tbody>
      </table>
      <p class="table-caveat" data-t="table_caveat"></p>
    </div>

    <div class="card" id="savings-card" style="display:none">
      <div class="card-title" data-t="savings_title"></div>
      <div class="savings-grid">
        <div class="savings-cell"><div class="val" id="s-rate"></div><div class="lbl" data-t="s_rate_lbl"></div></div>
        <div class="savings-cell"><div class="val" id="s-month"></div><div class="lbl" data-t="s_month_lbl"></div></div>
        <div class="savings-cell"><div class="val" id="s-year"></div><div class="lbl" data-t="s_year_lbl"></div></div>
      </div>
      <div class="savings-note" data-t="savings_note"></div>
    </div>

    <div class="card" id="steps-card" style="display:none">
      <div class="card-title" data-t="steps_title"></div>
      <div id="steps-list"></div>
    </div>

    <div class="tip-card" id="tip-card" style="display:none" data-t="tip"></div>

    <button class="btn-print" onclick="window.print()" data-t="print_btn"></button>
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-privacy">
      <span>🔒</span>
      <span data-t="footer_privacy"></span>
    </div>
    <div class="footer-row">
      <span data-t="footer_legal"></span>
    </div>
    <div class="footer-row footer-contact">
      <span data-t="footer_contact_label"></span>
      <a href="#" class="email-link" id="email-link" onclick="revealEmail(event)">
        <span data-t="footer_contact_show"></span>
      </a>
    </div>
  </footer>

</div>
<script>
// ── Translations ──────────────────────────────────────────────
const T = {

const THRESHOLDS = [60, 70, 80, 90, 100, 106];
let lang = 'nl';
let partCount = 0;

// ── Helpers ───────────────────────────────────────────────────
function fmt(n)    { return Math.round(n).toLocaleString('nl-NL'); }
function fmtE(n)   { return '€\u202f' + fmt(n); }
function getTier(ltv) {
  for (let i = 0; i < THRESHOLDS.length; i++) if (ltv <= THRESHOLDS[i]) return i;
  return THRESHOLDS.length - 1;
}
function colorClass(ltv) {
  return ltv <= 70 ? 'good' : ltv <= 90 ? 'neutral' : 'bad';
}

// ── Language ──────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.getElementById('btn-nl').classList.toggle('active', l === 'nl');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.documentElement.lang = l;
  renderText();
  updatePartLabels();
  updateTotal();
  document.getElementById('results').classList.remove('visible');
  document.getElementById('results').style.display = 'none';
}

function renderText() {
  const t = T[lang];
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });
}

// ── NHG ───────────────────────────────────────────────────────
function setNHG(hasNHG) {
  const t = T[lang];
  document.getElementById('nhg-yes').className = 'nhg-btn' + (hasNHG  ? ' selected-yes' : '');
  document.getElementById('nhg-no').className  = 'nhg-btn' + (!hasNHG ? ' selected-no'  : '');
  document.getElementById('nhg-result-yes').style.display = hasNHG  ? 'block' : 'none';
  document.getElementById('nhg-result-no').style.display  = !hasNHG ? 'block' : 'none';
  document.getElementById('main-form').style.display      = !hasNHG ? 'block' : 'none';
  // hide results if switching
  document.getElementById('results').classList.remove('visible');
  document.getElementById('results').style.display = 'none';
}

// ── Mortgage parts ────────────────────────────────────────────
function addPart() {
  if (partCount >= 5) return;
  partCount++;
  const t    = T[lang];
  const list = document.getElementById('parts-list');
  const row  = document.createElement('div');
  row.className = 'part-row';
  row.id = 'part-' + partCount;
  row.innerHTML = `
    <span class="part-label">${t.part_label} ${partCount}</span>
    <div class="input-wrap">
      <span class="prefix">€</span>
      <input type="number" id="debt-${partCount}" value="0" min="0" max="5000000" step="1000"
             oninput="updateTotal()" onchange="updateTotal()">
    </div>
    <button class="remove-btn" onclick="removePart(${partCount})" title="Verwijder">✕</button>`;
  list.appendChild(row);

  if (partCount === 1) {
    document.getElementById('debt-1').value = 220000;
    updateTotal();
  }

  document.getElementById('add-btn').style.display = partCount >= 5 ? 'none' : 'flex';
  updateTotal();
}

function removePart(id) {
  const el = document.getElementById('part-' + id);
  if (el) el.remove();
  updateTotal();
  // re-enable add button
  document.getElementById('add-btn').style.display = 'flex';
  partCount = document.querySelectorAll('.part-row').length;
  // re-label
  updatePartLabels();
}

function updatePartLabels() {
  const t = T[lang];
  document.querySelectorAll('.part-row').forEach((row, i) => {
    const lbl = row.querySelector('.part-label');
    if (lbl) lbl.textContent = t.part_label + ' ' + (i + 1);
  });
}

function getTotalDebt() {
  let total = 0;
  document.querySelectorAll('.part-row input[type="number"]').forEach(inp => {
    total += parseFloat(inp.value) || 0;
  });
  return total;
}

function updateTotal() {
  document.getElementById('debt-total-val').textContent = fmtE(getTotalDebt());
}

// ── Calculate ─────────────────────────────────────────────────
function calculate() {
  const t    = T[lang];
  const woz  = parseFloat(document.getElementById('woz').value)  || 0;
  const bank = parseFloat(document.getElementById('bank').value) || 0;
  const debt = getTotalDebt();

  if (!woz || !bank || !debt) {
    alert(lang === 'nl' ? 'Vul alle velden in.' : 'Please fill in all fields.');
    return;
  }

  const best  = Math.max(woz, bank);
  const which = woz >= bank ? t.which_woz : t.which_bank;

  const ltvOld = (debt / bank) * 100;
  const ltvNew = (debt / best) * 100;

  const oldIdx = getTier(ltvOld);
  const newIdx = getTier(ltvNew);
  const improved = newIdx < oldIdx;

  // Banner
  const banner = document.getElementById('banner');
  let html, cls;
  if (improved) {
    html = t.banner_good(ltvOld.toFixed(1), ltvNew.toFixed(1), fmt(best), which);
    cls  = 'banner-good';
  } else if (ltvNew < ltvOld) {
    html = t.banner_same(ltvOld.toFixed(1), ltvNew.toFixed(1));
    cls  = 'banner-same';
  } else {
    html = t.banner_none(ltvNew.toFixed(1));
    cls  = 'banner-none';
  }
  banner.innerHTML = html;
  banner.className = 'result-banner ' + cls;

  // LTV numbers — show ratio only, no bracket verdict
  const no = document.getElementById('ltv-old');
  no.textContent = ltvOld.toFixed(1) + '%';
  no.className   = 'num ' + colorClass(ltvOld);
  document.getElementById('tier-old').textContent = lang === 'nl' ? 'schuld / woningwaarde' : 'debt / home value';

  const nn = document.getElementById('ltv-new');
  nn.textContent = ltvNew.toFixed(1) + '%';
  nn.className   = 'num ' + colorClass(ltvNew);
  document.getElementById('tier-new').textContent = lang === 'nl' ? 'schuld / woningwaarde' : 'debt / home value';

  // Tier table
  const tbody = document.getElementById('tier-tbody');
  tbody.innerHTML = '';
  t.tiers.forEach(([range, meaning], i) => {
    const tr = document.createElement('tr');
    if (i === newIdx) tr.className = 'you';
    tr.innerHTML = `<td>${range}</td><td>${meaning}</td><td class="marker">${i === newIdx ? t.col_you : ''}</td>`;
    tbody.appendChild(tr);
  });

  // Savings & steps
  const savingsCard = document.getElementById('savings-card');
  const stepsCard   = document.getElementById('steps-card');
  const tipCard     = document.getElementById('tip-card');

  if (improved) {
    const reduction = (oldIdx - newIdx) * 0.25;
    const monthly   = (debt * reduction / 100) / 12;
    const yearly    = monthly * 12;
    document.getElementById('s-rate').textContent  = '~' + reduction.toFixed(2) + '%';
    document.getElementById('s-month').textContent = fmtE(monthly);
    document.getElementById('s-year').textContent  = fmtE(yearly);
    savingsCard.style.display = 'block';

    const stepsList = document.getElementById('steps-list');
    stepsList.innerHTML = '';
    t.steps.forEach(([num, title, body]) => {
      const d = document.createElement('div');
      d.className = 'step';
      d.innerHTML = `<div class="step-num">${num}</div><div><div class="step-title">${title}</div><div class="step-body">${body}</div></div>`;
      stepsList.appendChild(d);
    });
    stepsCard.style.display = 'block';
    tipCard.style.display   = 'none';
  } else {
    savingsCard.style.display = 'none';
    stepsCard.style.display   = 'none';
    tipCard.style.display     = 'block';
  }

  const resultsEl = document.getElementById('results');
  resultsEl.style.display = 'block';
  setTimeout(() => {
    resultsEl.classList.add('visible');
    resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.querySelector('.btn-print').classList.add('visible');
  }, 10);
}

// ── Email reveal (anti-spam obfuscation) ─────────────────────
function revealEmail(e) {
  e.preventDefault();
  const p = ['ltv', 'check', '@', 'proton', 'mail', '.com'];
  const addr = p.join('');
  const link = document.getElementById('email-link');
  link.href = 'mailto:' + addr;
  link.textContent = addr;
  link.onclick = null;
}

// ── Init ──────────────────────────────────────────────────────
renderText();
addPart(); // start with one mortgage part
